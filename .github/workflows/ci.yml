name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: team_finder
          POSTGRES_USER: team_finder
          POSTGRES_PASSWORD: team_finder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U team_finder -d team_finder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      POSTGRES_DB: team_finder
      POSTGRES_USER: team_finder
      POSTGRES_PASSWORD: team_finder
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      TASK_VERSION: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff
        run: ruff check .

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Django check
        run: python manage.py check
