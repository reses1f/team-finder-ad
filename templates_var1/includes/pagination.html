{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="Пагинация">
    {% if page_obj.has_previous %}
    <a href="?{% if query_string %}{{ query_string }}&{% endif %}page={{ page_obj.previous_page_number }}" class="pagination-link">← Назад</a>
    {% endif %}
    <span class="pagination-current">Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?{% if query_string %}{{ query_string }}&{% endif %}page={{ page_obj.next_page_number }}" class="pagination-link">Вперёд →</a>
    {% endif %}
</nav>
{% endif %}
